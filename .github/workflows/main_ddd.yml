name: build and publish v8 libs 111
on:
  workflow_dispatch:

env:
  V8_VERSION: "14.3.127.5"
  DEPOT_TOOLS_REPO: "https://chromium.googlesource.com/chromium/tools/depot_tools.git"

defaults:
  run:
    shell: bash

jobs:
  create-release:
    name: create release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.release_id }}
    steps:
      - name: Create GitHub Release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '1.0.1';
            const body = [
              'V8 ${{ env.V8_VERSION }} Precompiled Static Libraries',
              '',
              '**Note: Please download the build artifacts below, DO NOT use Source code**',
              '',
              '## Supported Platforms',
              '',
              '### Android (arm64, arm, x64)',
              '- Static library: `libv8_monolith-android-{arch}.zip`',
              '- Header files: `include-android.zip`',
              '- Each package includes: static library + args.gn + args.full.txt',
              '',
              '### iOS (XCFramework)',
              '- Package: `libv8_monolith-ios.zip`',
              '- Architectures: arm64 device + arm64 simulator',
              '- Includes: XCFramework with headers + args.gn + args.full.txt for both variants',
              '',
              '### macOS (XCFramework)',
              '- Package: `libv8_monolith-mac.zip`',
              '- Architecture: arm64 (Apple Silicon)',
              '- Includes: XCFramework with headers + args.gn + args.full.txt',
              '',
              '### Windows (x64)',
              '- Static library: `libv8_monolith-win-x64-release.zip` (Release)',
              '- Static library: `libv8_monolith-win-x64-debug.zip` (Debug)',
              '- Header files: `include-win.zip`',
              '- Package includes: static library + args.gn + args.full.txt'
            ].join('\n');
            
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release-${tag}`,
              draft: true,
              prerelease: false,
              body: body
            });
            
            core.setOutput('upload_url', release.data.upload_url);
            core.setOutput('release_id', release.data.id);
            return release.data;
            
  build-win:
    name: windows
    env:
      JOB_NAME: win
    needs: create-release
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        platform: [x64]
        build_type: [debug]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: setup env
        shell: pwsh
        run: |
          echo "${{ github.workspace }}/depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "DEPOT_TOOLS_WIN_TOOLCHAIN=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: prepared v8 build environment
        run: |
          echo "::group::Prepare v8 build environment"
          git config --global depot-tools.allowGlobalGitConfig true
          git clone $DEPOT_TOOLS_REPO > NUL
          gclient
          fetch v8
          cd v8
          
          echo "Checkout v8 version: %V8_VERSION%"
          git checkout $V8_VERSION
          
          cat > ../.gclient << 'EOF'
          solutions = [
            {
              "name": "v8",
              "url": "https://chromium.googlesource.com/v8/v8.git",
              "managed": False,
              "custom_deps": {
                "v8/test/benchmarks/data": None,
                "v8/test/mozilla/data": None,
                "v8/test/test262/data": None,
                "v8/test/wasm-js/data": None,
              },
            },
          ]
          EOF
          
          echo "Running gclient sync with dependencies..."
          gclient sync -D --force --reset
          echo "::endgroup::"
      - name: run pre-build script
        env:
          PLATFORM: ${{ matrix.platform }}
          JOB_NAME: ${{ env.JOB_NAME }}
          WORKSPACE: ${{ github.workspace }}
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          echo "::group::Run pre-build script"
          node builder.js
          echo "::endgroup::"
      - name: compile v8 static library
        shell: pwsh
        run: |
          echo "::group::Compile v8 static library"
          New-Item -ItemType directory -Path v8/out.gn/win.${{ matrix.platform }}.${{ matrix.build_type }}/
          Copy-Item "args.win.${{ matrix.platform }}.${{ matrix.build_type }}.gn" -Destination "v8/out.gn/win.${{ matrix.platform }}.${{ matrix.build_type }}/args.gn" -force
          Set-Location -Path v8
          gn gen out.gn/win.${{ matrix.platform }}.${{ matrix.build_type }}
          ninja v8_monolith -C out.gn/win.${{ matrix.platform }}.${{ matrix.build_type }}/
          gn args --list out.gn/win.${{ matrix.platform }}.${{ matrix.build_type }} > out.gn/win.${{ matrix.platform }}.${{ matrix.build_type }}/args.full.txt
          echo "::endgroup::"
      - name: compress artifacts
        shell: pwsh
        run: |
          echo "::group::Compress artifacts"
          7z a -tzip ${{ github.workspace }}/libv8_monolith-${{ env.JOB_NAME }}-${{ matrix.platform }}-${{ matrix.build_type }}.zip ${{ github.workspace }}/v8/out.gn/win.${{ matrix.platform }}.${{ matrix.build_type }}/obj/v8_monolith.lib
            
          if ("${{ matrix.platform }}" -eq "x64" -and "${{ matrix.build_type }}" -eq "release") {
            Compress-Archive -Path ${{ github.workspace }}/v8/include -Destination ${{ github.workspace }}/include-${{ env.JOB_NAME }}.zip
          }
          echo "::endgroup::"
      - name: Upload static library
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ github.workspace }}/libv8_monolith-${{ env.JOB_NAME }}-${{ matrix.platform }}-${{ matrix.build_type }}.zip
          asset_name: libv8_monolith-${{ env.JOB_NAME }}-${{ matrix.platform }}-${{ matrix.build_type }}.zip
          asset_content_type: application/zip
      - name: Upload include
        if: matrix.platform == 'x64' && matrix.build_type == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ github.workspace }}/include-${{ env.JOB_NAME }}.zip
          asset_name: include-${{ env.JOB_NAME }}.zip
          asset_content_type: application/zip

  publish-release:
    name: publish release
    needs: [build-win]
    runs-on: ubuntu-latest
    steps:
    - name: Publish Release
      uses: actions/github-script@v7
      with:
        script: |
          const tag = '1.0.1';
          const releases = await github.rest.repos.listReleases({
            owner: context.repo.owner,
            repo: context.repo.repo,
          });
          const release = releases.data.find(r => r.tag_name === tag);
          if (release) {
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false
            });
            console.log('Release published successfully');
          }
