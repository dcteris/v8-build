name: build and publish v8 libs
on:
  push:
    tags:
      - 'v*'

env:
  V8_VERSION: "14.1"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build-and-release:
    name: build and release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: compile v8 for android
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          export PATH="$GITHUB_WORKSPACE/depot_tools:${PATH}"
          gclient
          fetch v8
          echo "target_os = ['android']" >> ${{ github.workspace }}/.gclient
          cd ${{ github.workspace }}/v8
          git checkout branch-heads/$V8_VERSION
          gclient sync
          ./build/install-build-deps.sh
          mkdir -p out.gn/android.${{ matrix.platform }}.release/
          cp ${{ github.workspace }}/args.android.${{ matrix.platform }}.clang.gn $GITHUB_WORKSPACE/v8/out.gn/android.${{ matrix.platform }}.release/args.gn
          gn gen out.gn/android.${{ matrix.platform }}.release
          ninja v8_monolith -C out.gn/android.${{ matrix.platform }}.release/
          gn args --list out.gn/android.${{ matrix.platform }}.release
          mkdir -p ../staging/lib
          mkdir -p ../staging/include
          cp out.gn/android.${{ matrix.platform }}.release/obj/libv8_monolith.a ../staging/lib/
          cp -r out.gn/android.${{ matrix.platform }}.release/gen/* ../staging/include/
          cd ../staging
          zip -r ../v8-android-${{ matrix.platform }}-${{ github.ref_name }}.zip .
          cd -
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release-${{ github.ref }}
          draft: false
          prerelease: false
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ github.workspace }}/v8-android-${{ matrix.platform }}-${{ github.ref_name }}.zip
          asset_name: v8-android-${{ matrix.platform }}-${{ github.ref_name }}.zip
          asset_content_type: application/zip
